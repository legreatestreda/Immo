name: Recherche Nom Agence via Email

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'   # toutes les 3h

concurrency:
  group: recherche-email
  cancel-in-progress: false

jobs:
  rechercher:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lancer la recherche
        id: recherche
        env:
          SERPER_API_KEYS: ${{ secrets.SERPER_API_KEYS }}
        run: python scripts/rechercher_email.py

      - name: Commit résultats
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/recherche_email_raw.jsonl || true
          git add data/progress_recherche_email.json || true
          git add data/emails_bloques.txt || true
          git diff --staged --quiet || git commit -m "recherche email: progression $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase --autostash
          git push
          
      - name: Relancer automatiquement s'il reste des agences
        if: steps.recherche.outputs.restants_apres != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Il reste ${{ steps.recherche.outputs.restants_apres }} agences — relance automatique."
          gh workflow run recherche_email.yml --ref main
