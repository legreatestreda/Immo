name: Extraction Infos Agences

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */1 * * *'   # toutes les 5h

concurrency:
  group: extraction-infos
  cancel-in-progress: false

jobs:
  extraire:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer dépendances
        run: pip install -r requirements.txt

      - name: Lancer l'extraction
        id: extraction
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python scripts/extraire_infos.py

      - name: Commit résultats
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/resultats.csv data/progress.json || true
          git diff --staged --quiet || git commit -m "extraction: progression $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase --autostash
          git push

      - name: Relancer automatiquement s'il reste des zips
        if: steps.extraction.outputs.restants_apres != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Il reste ${{ steps.extraction.outputs.restants_apres }} zips — relance automatique."
          gh workflow run extraction.yml --ref main
